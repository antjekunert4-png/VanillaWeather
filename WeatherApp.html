<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="src/styles.css" />
    <title>Weather App</title>
</head>

<body>
    <div class="weather-app">
        <header>
            <form class="search-form">
                <input type="search" placeholder="Enter a city.." required class="search-form-input" />
                <input type="submit" value="Search" class="search-button" />
            </form>
        </header>
        <main>
            <div>
                <h1>Amsterdam</h1>
                <p>
                    Tuesday 14:40, scattered clouds
                    <br />
                    humidity: 66%, Wind: 3.13km/h
                </p>
            </div>
            <div>☀️ 24°C</div>
        </main>
        <footer>
            <p>
                This project was coded by
                <a href="https://github.com/antjekunert4-png" target="_blank">Antje Kunert</a> and is open-sourced
                <a href="https://github.com/antjekunert4-png/VanillaWeather" target="_blank"> on GitHub</a> and
                <a href="https://weather-app-antje.netlify.app/" target="_blank">hosted on Netlify</a>
            </p>
        </footer>
    </div>
</body>

</html>
